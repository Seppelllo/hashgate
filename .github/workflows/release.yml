name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    # a tag must never publish anything the suite has not passed AT THE TAG
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --no-editable --group dev python -m pytest -q
      - name: Lint
        run: uv run --no-editable --group dev ruff check src tests examples

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard - tag must match pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::tag v$TAG does not match pyproject.toml version $VERSION — bump the version (or fix the tag) and re-tag"
            exit 1
          fi
          echo "tag v$TAG matches pyproject version $VERSION"
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hashgate
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing — no tokens/secrets
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
