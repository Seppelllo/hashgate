name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --no-editable --group dev python -m pytest -q
      - name: Lint
        run: uv run --no-editable --group dev ruff check src tests examples
      - name: Verify install (console scripts, fail-closed wrapper)
        run: bash scripts/verify_install.sh
