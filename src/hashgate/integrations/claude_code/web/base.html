<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}hashgate{% endblock %}</title>
<link rel="stylesheet" href="/ui/static/app.css">
</head>
<body>
<header>
  <nav>
    <a href="/ui" class="brand">hashgate</a>
    <a href="/ui">Pending</a>
    <a href="/ui/history">History</a>
    <form method="post" action="/ui/logout" class="inline">
      <input type="hidden" name="csrf" value="{{ csrf }}">
      <button type="submit" class="linklike">Logout</button>
    </form>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
